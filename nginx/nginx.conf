# 🏥 MIMS: Reverse Proxy Configuration (2026 Standards)

upstream fastapi_app {
    server web:8000;    # Points to the 'web' service in docker-compose
}

server {
    listen 80;
    server_name localhost;

    # ⚖️ Security Headers ( Compliance with NDPA Section 39)
    add_header Content-Security-Policy "default-src 'self' ; frame-ancestors 'none';"

    # Hide Nginx version for "security by Obsecurity"
    server_tokens off;

    # 📝 Access & Error Logs (Evidence Act S84 Compliance)
    access_log /var/log/nginx/mims_access.log;
    error_log /var/log/nginx/mims_access.log warn;

    location / {
        proxy_pass http://fastapi_app;

        # 🛡️ Pass real IP to FastAPI for accurate Audit Trails
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings for long clinical operations
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Optional: Serve Static Media (e.g., Patient Scans/X-rays)
    location /static/ {
        alias /app/static/;
    }
}