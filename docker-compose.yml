services:
  # The Database Registry (The Hospital's Archive)
  db:
    image: pgvector/pgvector:pg15
    container_name: mims_db_prod
    restart: always
    ports:
      - "5432:5432"  # 🏛️ EXPOSE THIS: Links Docker port to Local port
    env_file: .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - mims_data:/var/lib/postgresql/data 
    networks:
      - mims_internal_network
    healthcheck:
      # ⭐ FIXED: Removed the double $$ to ensure the shell reads the .env variables correctly
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # The Web Application (The Clinical Interface)
  web:
    build: .
    container_name: mims_web_app
    restart: always
    ports:
      - "8000:8000"
    # Ensure the command points to the package 'app' and the module 'main'
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/code
    working_dir: /code
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      # Explicitly set PYTHONPATH to /code so Python can find the 'app' package
      - PYTHONPATH=/code
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mims_internal_network

networks:
  mims_internal_network:
    driver: bridge

volumes:
  mims_data: